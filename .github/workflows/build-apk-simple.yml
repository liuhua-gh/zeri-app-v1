name: Build Android APK Simple

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    - name: Install dependencies
      run: |
        export PIP_BREAK_SYSTEM_PACKAGES=1
        python -m pip install --break-system-packages buildozer cython
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev openjdk-17-jdk
        sudo apt-get install -y automake autoconf libtool libtool-bin m4 pkg-config
        sudo apt-get install -y libncurses-dev libncursesw5-dev cmake libffi-dev libssl-dev zlib1g-dev zip unzip

    - name: Configure git mirrors for submodules
      run: |
        git config --global url."https://github.com/google/skcms".insteadOf "https://skia.googlesource.com/skcms"

    - name: Pin pip toolchain versions for p4a venv
      run: |
        cat > pip-constraints.txt << 'EOF'
        pip==24.3.1
        setuptools==75.6.0
        wheel==0.43.0
        EOF
    
    - name: Build APK
      run: |
        set -o pipefail
        buildozer android debug 2>&1 | tee buildozer.log
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        PIP_CONSTRAINT: ${{ github.workspace }}/pip-constraints.txt
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zeri-app-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-logs-simple
        path: |
          buildozer.log
          .buildozer/**/*.log
        if-no-files-found: warn
        retention-days: 30
