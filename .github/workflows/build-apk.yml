name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer
        pip install cython
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3 python3-pip python3-dev openjdk-17-jdk
        sudo apt-get install -y automake autoconf libtool pkg-config cmake zip unzip
        sudo apt-get install -y libffi-dev libssl-dev zlib1g-dev libncurses-dev libncursesw5-dev

    - name: Configure git mirrors for submodules
      run: |
        git config --global url."https://github.com/google/skcms".insteadOf "https://skia.googlesource.com/skcms"
    
    - name: Build APK
      run: |
        set -o pipefail
        buildozer android debug 2>&1 | tee buildozer.log
      env:
        BUILDOZER_WARN_ON_ROOT: 1
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zeri-app-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-logs
        path: |
          buildozer.log
          .buildozer/**/*.log
        if-no-files-found: warn
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
