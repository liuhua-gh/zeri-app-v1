name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure git mirror for skcms
      run: |
        git config --global url."https://github.com/google/skcms".insteadOf "https://skia.googlesource.com/skcms"

    - name: Install build tools in container
      run: |
        export PIP_BREAK_SYSTEM_PACKAGES=1
        python3 -m pip install --user --break-system-packages buildozer cython
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/buildozer" --version
    
    - name: Build APK
      run: |
        set -o pipefail
        "$HOME/.local/bin/buildozer" android debug 2>&1 | tee buildozer.log
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zeri-app-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-logs
        path: |
          buildozer.log
          .buildozer/**/*.log
        if-no-files-found: warn
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
